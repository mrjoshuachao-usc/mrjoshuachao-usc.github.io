<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>三角形球 · 貼圖版</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a0f;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    color: #fff;
    touch-action: none;
    overscroll-behavior: none;
  }
  #canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
    cursor: grab;
  }
  #canvas.grabbing { cursor: grabbing; }
  .hint {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, calc(50vmin * 0.55));
    pointer-events: none;
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    padding: 8px 16px;
    background: rgba(20,20,30,0.6);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    opacity: 1;
    transition: opacity 0.6s ease;
    white-space: nowrap;
  }
  .hint.hidden { opacity: 0; }
  .turn-indicator {
    position: fixed;
    top: env(safe-area-inset-top, 16px);
    left: 50%;
    transform: translateX(-50%);
    margin-top: 8px;
    padding: 10px 18px;
    background: rgba(20,20,30,0.72);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    -webkit-backdrop-filter: blur(14px);
    backdrop-filter: blur(14px);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    pointer-events: none;
    z-index: 5;
    white-space: nowrap;
  }
  .turn-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #ef4444;
    box-shadow: 0 0 10px #ef4444;
    transition: background 0.25s ease, box-shadow 0.25s ease;
  }
  #loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0f;
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    z-index: 10;
    transition: opacity 0.4s ease;
  }
  #loading.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .fence-counts {
    position: fixed;
    bottom: env(safe-area-inset-bottom, 16px);
    left: 0;
    right: 0;
    padding: 12px 16px;
    pointer-events: none;
    display: flex;
    justify-content: center;
    gap: 18px;
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.02em;
  }
  .fence-count-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .fence-count-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="turn-indicator">
  <span class="turn-dot" id="turnDot"></span>
  <span id="turnText">紅色玩家回合</span>
</div>
<div class="hint" id="hint">拖曳旋轉 · 點白線放柵欄</div>
<div class="fence-counts" id="fenceCounts"></div>
<div id="loading">載入圖磚中…</div>

// ---------- Build 80-face geodesic ball geometry ----------
const phi = (1 + Math.sqrt(5)) / 2;

const rawVerts = [
  [-1,  phi,  0], [ 1,  phi,  0], [-1, -phi,  0], [ 1, -phi,  0],
  [ 0, -1,  phi], [ 0,  1,  phi], [ 0, -1, -phi], [ 0,  1, -phi],
  [ phi,  0, -1], [ phi,  0,  1], [-phi,  0, -1], [-phi,  0,  1]
];
const V = rawVerts.map(v => {
  const L = Math.hypot(v[0], v[1], v[2]);
  return [v[0]/L, v[1]/L, v[2]/L];
});

const FACES = [
  [0,11,5],[0,5,1],[0,1,7],[0,7,10],[0,10,11],
  [1,5,9],[5,11,4],[11,10,2],[10,7,6],[7,1,8],
  [3,9,4],[3,4,2],[3,2,6],[3,6,8],[3,8,9],
  [4,9,5],[2,4,11],[6,2,10],[8,6,7],[9,8,1]
];

function midOnSphere(a, b) {
  const mx = (a[0] + b[0]) / 2;
  const my = (a[1] + b[1]) / 2;
  const mz = (a[2] + b[2]) / 2;
  const L = Math.hypot(mx, my, mz);
  return [mx/L, my/L, mz/L];
}

// ---------- Tile distribution: evenly split across 80 triangles ----------
const TOTAL_TRIS = 80;
const tileAssignments = [];
const base = Math.floor(TOTAL_TRIS / TILE_KEYS.length);  // 11
const remainder = TOTAL_TRIS - base * TILE_KEYS.length;  // 3

// Shuffle which tile types get the extra slots so it's random each reload
const typeOrder = [...TILE_KEYS];
for (let i = typeOrder.length - 1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [typeOrder[i], typeOrder[j]] = [typeOrder[j], typeOrder[i]];
}
typeOrder.forEach((key, idx) => {
  const count = base + (idx < remainder ? 1 : 0);
  for (let k = 0; k < count; k++) tileAssignments.push(key);
});

// Shuffle assignments across triangles
for (let i = tileAssignments.length - 1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [tileAssignments[i], tileAssignments[j]] = [tileAssignments[j], tileAssignments[i]];
}

// ---------- Build texture atlas from SVG tiles ----------
// 3×3 grid: 7 tiles used, positions (col, row):
//   empty(0,0) berry(1,0) house(2,0)
//   sheep_white(0,1) sheep_grey(1,1) sheep_black(2,1)
//   tree(0,2) — — 
const ATLAS_GRID = 3;
const CELL_PX = 512;                // pixels per cell
const ATLAS_PX = CELL_PX * ATLAS_GRID;

const TILE_CELL = {
  empty:       [0, 0],
  berry:       [1, 0],
  house:       [2, 0],
  sheep_white: [0, 1],
  sheep_grey:  [1, 1],
  sheep_black: [2, 1],
  tree:        [0, 2]
};

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = (e) => reject(new Error("圖磚載入失敗: " + src.slice(0, 50)));
    img.src = src;
  });
}

async function buildAtlas() {
  const atlasCanvas = document.createElement('canvas');
  atlasCanvas.width = ATLAS_PX;
  atlasCanvas.height = ATLAS_PX;
  const ctx = atlasCanvas.getContext('2d');

  // SVGs have transparent edges; paint a neutral background per cell so
  // exposed pixels match the game board colour.
  ctx.fillStyle = '#8bc53f'; // grass green from the SVG palette
  ctx.fillRect(0, 0, ATLAS_PX, ATLAS_PX);

  await Promise.all(TILE_KEYS.map(async (key) => {
    const [col, row] = TILE_CELL[key];
    const img = await loadImage(SVG_DATA[key]);
    // Hex tile aspect is ~1.155:1 (width:height). Stretch to fill cell.
    // Content sits near centre of the tile, which is what the triangular
    // UV sample will show.
    ctx.drawImage(img, col * CELL_PX, row * CELL_PX, CELL_PX, CELL_PX);
  }));

  return atlasCanvas;
}

// ---------- Assemble geometry with positions, UVs, edges ----------
function buildMesh(atlasCanvas) {
  const positions = [];
  const uvs = [];
  const edges = [];

  // SVG's content triangle: apex at (56.69, 0), bottom corners at (0, 98.19) and (113.38, 98.19).
  // Normalised into the cell this is (0.5, 0), (0, 1), (1, 1) — so the triangle's 3 edges
  // are exactly at the cell boundaries. Tiny inset avoids bleed from neighbouring cells.
  const PAD = 0.003;
  const TRI_TOP = [0.5,      PAD];
  const TRI_BL  = [PAD,      1 - PAD];
  const TRI_BR  = [1 - PAD,  1 - PAD];

  function pushTri(p1, p2, p3, tileKey) {
    positions.push(
      p1[0], p1[1], p1[2],
      p2[0], p2[1], p2[2],
      p3[0], p3[1], p3[2]
    );
    const [col, row] = TILE_CELL[tileKey];
    const toAtlas = (uv) => [(col + uv[0]) / ATLAS_GRID, (row + uv[1]) / ATLAS_GRID];
    const [uTop, vTop] = toAtlas(TRI_TOP);
    const [uBL,  vBL ] = toAtlas(TRI_BL);
    const [uBR,  vBR ] = toAtlas(TRI_BR);
    uvs.push(uTop, vTop, uBL, vBL, uBR, vBR);
  }

  function pushEdge(a, b) {
    edges.push(a[0], a[1], a[2], b[0], b[1], b[2]);
  }

  let triIdx = 0;
  for (const f of FACES) {
    const a = V[f[0]], b = V[f[1]], c = V[f[2]];
    const mab = midOnSphere(a, b);
    const mbc = midOnSphere(b, c);
    const mca = midOnSphere(c, a);

    pushTri(a,   mab, mca, tileAssignments[triIdx++]);
    pushTri(mab, b,   mbc, tileAssignments[triIdx++]);
    pushTri(mca, mbc, c,   tileAssignments[triIdx++]);
    pushTri(mab, mbc, mca, tileAssignments[triIdx++]);

    pushEdge(a, mab); pushEdge(mab, b);
    pushEdge(b, mbc); pushEdge(mbc, c);
    pushEdge(c, mca); pushEdge(mca, a);
    pushEdge(mab, mbc); pushEdge(mbc, mca); pushEdge(mca, mab);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs, 2));
  geo.computeVertexNormals();

  const atlasTexture = new THREE.CanvasTexture(atlasCanvas);
  atlasTexture.flipY = false; // match canvas coords (y=0 at top)
  atlasTexture.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
  atlasTexture.minFilter = THREE.LinearFilter;   // no mipmaps — avoids cross-cell bleed
  atlasTexture.magFilter = THREE.LinearFilter;
  atlasTexture.generateMipmaps = false;
  atlasTexture.needsUpdate = true;

  const mat = new THREE.MeshPhongMaterial({
    map: atlasTexture,
    flatShading: true,
    shininess: 8,
    // Push face fragments back slightly so the white edge cylinders draw
    // cleanly on top without z-fighting along triangle boundaries.
    polygonOffset: true,
    polygonOffsetFactor: 1,
    polygonOffsetUnits: 1
  });
  const mesh = new THREE.Mesh(geo, mat);

  // ---------- Edge lines as thin white cylinders (instanced) ----------
  // Dedupe: every shared sub-edge appears twice in `edges` (once per adjacent face).
  // Rendering each twice would double the visible thickness on shared edges.
  const edgeMap = new Map();
  for (let i = 0; i < edges.length; i += 6) {
    const pa = [edges[i],   edges[i+1], edges[i+2]];
    const pb = [edges[i+3], edges[i+4], edges[i+5]];
    const ka = pa.map(x => x.toFixed(5)).join(',');
    const kb = pb.map(x => x.toFixed(5)).join(',');
    const key = ka < kb ? ka + '|' + kb : kb + '|' + ka;
    if (!edgeMap.has(key)) edgeMap.set(key, [pa, pb]);
  }
  const uniqueEdges = Array.from(edgeMap.values());

  // Cylinder radius tuned to roughly 2 screen pixels at the default
  // camera distance (z=3.5) on typical iPad viewports.
  const EDGE_RADIUS = 0.0045;
  const cylGeo = new THREE.CylinderGeometry(1, 1, 1, 6, 1, false);
  const edgeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const edgeMesh = new THREE.InstancedMesh(cylGeo, edgeMat, uniqueEdges.length);

  const dummy = new THREE.Object3D();
  const Y_UP = new THREE.Vector3(0, 1, 0);
  const tmpDir = new THREE.Vector3();
  uniqueEdges.forEach(([pa, pb], i) => {
    tmpDir.set(pb[0] - pa[0], pb[1] - pa[1], pb[2] - pa[2]);
    const len = tmpDir.length();
    tmpDir.divideScalar(len);
    dummy.position.set((pa[0] + pb[0]) / 2, (pa[1] + pb[1]) / 2, (pa[2] + pb[2]) / 2);
    dummy.quaternion.setFromUnitVectors(Y_UP, tmpDir);
    dummy.scale.set(EDGE_RADIUS, len, EDGE_RADIUS);
    dummy.updateMatrix();
    edgeMesh.setMatrixAt(i, dummy.matrix);
  });
  edgeMesh.instanceMatrix.needsUpdate = true;
  mesh.add(edgeMesh);

  // ---------- Invisible fatter cylinders for easy tap detection ----------
  // Visible cylinders are only ~2 pixels wide, hard to hit exactly.
  // A fatter invisible twin gives a forgiving hit area.
  const HIT_RADIUS = 0.022;
  const hitMat = new THREE.MeshBasicMaterial({
    transparent: true,
    opacity: 0,
    depthWrite: false
  });
  const hitMesh = new THREE.InstancedMesh(cylGeo, hitMat, uniqueEdges.length);
  uniqueEdges.forEach(([pa, pb], i) => {
    tmpDir.set(pb[0] - pa[0], pb[1] - pa[1], pb[2] - pa[2]);
    const len = tmpDir.length();
    tmpDir.divideScalar(len);
    dummy.position.set((pa[0] + pb[0]) / 2, (pa[1] + pb[1]) / 2, (pa[2] + pb[2]) / 2);
    dummy.quaternion.setFromUnitVectors(Y_UP, tmpDir);
    dummy.scale.set(HIT_RADIUS, len, HIT_RADIUS);
    dummy.updateMatrix();
    hitMesh.setMatrixAt(i, dummy.matrix);
  });
  hitMesh.instanceMatrix.needsUpdate = true;
  hitMesh.renderOrder = 0;
  mesh.add(hitMesh);

  // Expose references for the game logic outside this function
  edgeHitMesh = hitMesh;
  uniqueEdgesRef = uniqueEdges;

  return mesh;
}

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const d1 = new THREE.DirectionalLight(0xffffff, 0.55);
d1.position.set(3, 4, 5);
scene.add(d1);
const d2 = new THREE.DirectionalLight(0xaabbee, 0.25);
d2.position.set(-3, -2, -2);
scene.add(d2);

// ---------- Drag rotation (world-axis, with inertia) + tap detection ----------
const Y_AXIS = new THREE.Vector3(0, 1, 0);
const X_AXIS = new THREE.Vector3(1, 0, 0);
const SENSITIVITY = 0.006;
const DAMPING = 0.94;
const STOP_THRESHOLD = 0.00005;
const TAP_THRESHOLD = 8; // pixels of movement before we commit to a drag

let mesh = null;
let edgeHitMesh = null;
let uniqueEdgesRef = null;

let activePointerId = null;
let isDragging = false;
let didDrag = false;
let startX = 0, startY = 0;
let lastX = 0, lastY = 0;
let velX = 0, velY = 0;
let hasInteracted = false;

function rotateBy(dx, dy) {
  if (!mesh) return;
  mesh.rotateOnWorldAxis(Y_AXIS, dx);
  mesh.rotateOnWorldAxis(X_AXIS, dy);
}

canvas.addEventListener('pointerdown', (e) => {
  if (!mesh || activePointerId !== null) return;
  activePointerId = e.pointerId;
  startX = e.clientX;
  startY = e.clientY;
  lastX = e.clientX;
  lastY = e.clientY;
  velX = 0;
  velY = 0;
  didDrag = false;
  isDragging = false;
  canvas.classList.add('grabbing');
  try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
  if (!hasInteracted) {
    hasInteracted = true;
    hint.classList.add('hidden');
  }
});

canvas.addEventListener('pointermove', (e) => {
  if (e.pointerId !== activePointerId) return;
  const tdx = e.clientX - startX;
  const tdy = e.clientY - startY;
  if (!didDrag && Math.hypot(tdx, tdy) > TAP_THRESHOLD) {
    didDrag = true;
    isDragging = true;
  }
  if (isDragging) {
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    velX = dx * SENSITIVITY;
    velY = dy * SENSITIVITY;
    rotateBy(velX, velY);
    lastX = e.clientX;
    lastY = e.clientY;
  }
});

function endPointer(e) {
  if (e.pointerId !== activePointerId) return;
  activePointerId = null;
  canvas.classList.remove('grabbing');
  try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
  if (!didDrag) {
    handleTap(e.clientX, e.clientY);
  }
  isDragging = false;
  didDrag = false;
}
canvas.addEventListener('pointerup', endPointer);
canvas.addEventListener('pointercancel', endPointer);
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// ---------- Game: 3 players placing coloured fence bars on edges ----------
const PLAYER_COLORS = [0xef4444, 0x3b82f6, 0xfbbf24]; // red, blue, yellow
const PLAYER_NAMES  = ['紅', '藍', '黃'];
let currentPlayer = 0;
const fencedEdges = new Map(); // edgeIndex → fence Mesh

const raycaster = new THREE.Raycaster();
const ndcVec = new THREE.Vector2();

// Fence bar — long column with a square cross-section, lying along the edge
const FENCE_THICKNESS = 0.08;      // side of the square cross-section (5× the old thin dim)
const FENCE_LENGTH_RATIO = 0.92;   // slightly shorter than edge so corners don't collide

function handleTap(screenX, screenY) {
  if (!edgeHitMesh || !uniqueEdgesRef) return;
  ndcVec.x = (screenX / window.innerWidth) * 2 - 1;
  ndcVec.y = -(screenY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(ndcVec, camera);
  const hits = raycaster.intersectObject(edgeHitMesh);
  if (hits.length === 0) return;
  const edgeIndex = hits[0].instanceId;
  if (edgeIndex === undefined) return;
  if (fencedEdges.has(edgeIndex)) return; // already fenced, ignore
  placeFence(edgeIndex);
}

function placeFence(edgeIndex) {
  const [pa, pb] = uniqueEdgesRef[edgeIndex];

  // Local frame at the edge midpoint:
  //   E  = edge direction (along chord)
  //   Op = outward-ish axis perpendicular to E (so fence stands up)
  //   S  = E × Op (sideways tangent)
  const edgeVec = new THREE.Vector3(pb[0]-pa[0], pb[1]-pa[1], pb[2]-pa[2]);
  const edgeLen = edgeVec.length();
  edgeVec.divideScalar(edgeLen);

  const mid = new THREE.Vector3((pa[0]+pb[0])/2, (pa[1]+pb[1])/2, (pa[2]+pb[2])/2);
  const radial = mid.clone().normalize();
  const outPerp = radial.clone()
    .sub(edgeVec.clone().multiplyScalar(radial.dot(edgeVec)))
    .normalize();
  const side = new THREE.Vector3().crossVectors(edgeVec, outPerp);

  const boxGeo = new THREE.BoxGeometry(
    edgeLen * FENCE_LENGTH_RATIO,
    FENCE_THICKNESS,
    FENCE_THICKNESS
  );
  const boxMat = new THREE.MeshPhongMaterial({
    color: PLAYER_COLORS[currentPlayer],
    shininess: 40
  });
  const fence = new THREE.Mesh(boxGeo, boxMat);

  // Position so the bar's bottom face rests on the sphere surface along the edge.
  // Push outward by the chord gap (midpoint is slightly inside the sphere)
  // plus half the thickness so the bottom is flush with the surface.
  const chordGap = 1 - mid.length();
  fence.position.copy(mid).addScaledVector(radial, chordGap + FENCE_THICKNESS / 2);

  // Orient: local X → along edge, local Y → outward, local Z → side
  const rotMat = new THREE.Matrix4().makeBasis(edgeVec, outPerp, side);
  fence.setRotationFromMatrix(rotMat);

  fence.userData.player = currentPlayer;
  mesh.add(fence);
  fencedEdges.set(edgeIndex, fence);

  currentPlayer = (currentPlayer + 1) % PLAYER_COLORS.length;
  updateTurnUI();
  renderFenceCounts();
}

function colorHex(intColor) {
  return '#' + intColor.toString(16).padStart(6, '0');
}

function updateTurnUI() {
  const hex = colorHex(PLAYER_COLORS[currentPlayer]);
  turnDotEl.style.background = hex;
  turnDotEl.style.boxShadow = `0 0 10px ${hex}`;
  turnTextEl.textContent = PLAYER_NAMES[currentPlayer] + '色玩家回合';
}

function renderFenceCounts() {
  const counts = [0, 0, 0];
  for (const fence of fencedEdges.values()) {
    counts[fence.userData.player]++;
  }
  fenceCountsEl.innerHTML = PLAYER_COLORS.map((c, i) => {
    const hex = colorHex(c);
    return `<span class="fence-count-item"><span class="fence-count-dot" style="background:${hex}"></span>${PLAYER_NAMES[i]} ${counts[i]}</span>`;
  }).join('');
}

updateTurnUI();
renderFenceCounts();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight, false);
});

// ---------- Main async boot ----------
(async function main() {
  try {
    const atlas = await buildAtlas();
    mesh = buildMesh(atlas);
    mesh.rotation.x = 0.25;
    mesh.rotation.y = 0.4;
    scene.add(mesh);
    loading.classList.add('hidden');
  } catch (err) {
    loading.textContent = "載入失敗: " + err.message;
    console.error(err);
  }
})();

function animate() {
  requestAnimationFrame(animate);
  if (mesh && !isDragging &&
      (Math.abs(velX) > STOP_THRESHOLD || Math.abs(velY) > STOP_THRESHOLD)) {
    rotateBy(velX, velY);
    velX *= DAMPING;
    velY *= DAMPING;
  }
  renderer.render(scene, camera);
}
animate();
</script>
</body>
